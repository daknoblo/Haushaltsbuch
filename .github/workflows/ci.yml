name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6

      - name: Verify generated templ code is up to date
        run: |
          go tool templ generate
          git diff --exit-code

      - name: Test (race detector)
        run: go test -race ./...

      - name: Build (static, CGO-free)
        run: CGO_ENABLED=0 go build ./...
